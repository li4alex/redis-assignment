apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: python-api
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/li4alex/redis-assignment.git
    targetRevision: HEAD
    path: helm/redis-fastapi

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true